name: Validate site files

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  validate-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate public site files
        run: python scripts/validate_site.py --final
